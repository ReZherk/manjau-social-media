spring:
  application:
    name: manjau-social-media
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/manjau_social}
    username: ${SPRING_DATASOURCE_USERNAME:manjau}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@manjau.com}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: ${PORT:8081}

jwt:
  access-secret: ${JWT_ACCESS_SECRET:change_me_access_secret_key_32_chars_min}
  access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

admin:
  initial-email: ${ADMIN_INITIAL_EMAIL:admin@manjau.com}
  initial-password: ${ADMIN_INITIAL_PASSWORD:ChangeMe123!}

app:
  encryption-secret: ${APP_ENCRYPTION_SECRET:change_me_encryption_secret_key_min}
  storage:
    location: ${APP_STORAGE_LOCATION:uploads}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.manjau: DEBUG
    org.springframework.security: DEBUG
