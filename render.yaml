# Render Blueprint — backend web service (Docker).
# The database lives on Neon (external); set its values as secrets below.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
services:
  - type: web
    name: manjau-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ---- Database (Neon) — paste from the Neon dashboard ----
      - key: SPRING_DATASOURCE_URL
        sync: false   # jdbc:postgresql://<host>/<db>?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # ---- Secrets (auto-generated by Render) ----
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION_MINUTES
        value: "15"
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: "7"
      # ---- Initial admin ----
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      # ---- Email (Brevo / any SMTP relay) ----
      - key: MAIL_HOST
        sync: false   # smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: "true"
      - key: MAIL_SMTP_STARTTLS
        value: "true"
      - key: MAIL_FROM
        sync: false   # e.g. no-reply@tudominio.com (a verified Brevo sender)
      # ---- Frontend / CORS (Vercel URL) ----
      - key: FRONTEND_URL
        sync: false   # https://<tu-app>.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # https://<tu-app>.vercel.app
      - key: APP_STORAGE_LOCATION
        value: uploads
